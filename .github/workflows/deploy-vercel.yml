name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint --max-warnings 9999

      - name: Type check
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: pnpm build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"

      - name: Post-deploy verify
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -e
          echo "Expected commitSha: $EXPECTED_SHA"
          for i in $(seq 1 30); do
            VERSION=$(curl -s https://surechigai.kimito.link/version.json || echo "{}")
            ACTUAL=$(echo "$VERSION" | jq -r '.commitSha // "unknown"')
            echo "Attempt $i/30: version.json commitSha=$ACTUAL"
            if [[ "$ACTUAL" == "$EXPECTED_SHA" ]]; then
              echo "Deploy verified"
              exit 0
            fi
            sleep 20
          done
          echo "version.json not updated yet (Vercel may still be building)"
          exit 1
