name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production

      - name: Build Project Artifacts
        run: vercel build --prod

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod

      - name: Post-deploy verify
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -e
          echo "Expected commitSha: $EXPECTED_SHA"
          sleep 5
          for i in $(seq 1 40); do
            VERSION=$(curl -s https://surechigai.kimito.link/version.json || echo "{}")
            ACTUAL=$(echo "$VERSION" | jq -r '.commitSha // "unknown"')
            echo "Attempt $i/40: version.json commitSha=$ACTUAL"
            if [[ "$ACTUAL" == "$EXPECTED_SHA" ]]; then
              echo "Deploy verified"
              exit 0
            fi
            sleep 5
          done
          echo "version.json not updated yet (Vercel may still be building)"
          exit 1
