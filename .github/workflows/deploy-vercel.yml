name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Lint (with auto-fix attempt)
        run: |
          set -e
          # 閾ｪ蜍穂ｿｮ豁｣蜿ｯ閭ｽ縺ｪ繧ｨ繝ｩ繝ｼ繧剃ｿｮ豁｣
          pnpm lint --fix || true
          # 菫ｮ豁｣蠕後√お繝ｩ繝ｼ縺ｮ縺ｿ繧偵メ繧ｧ繝・け・郁ｭｦ蜻翫・辟｡隕厄ｼ・          pnpm lint --max-warnings 9999 || {
            echo "笞・・Lint errors detected. Please fix them before deploying."
            exit 1
          }
      
      - name: Type check
        run: |
          set -e
          echo "剥 Running TypeScript type check..."
          pnpm check || {
            echo "笶・Type check failed. Please fix type errors before deploying."
            exit 1
          }
          echo "笨・Type check passed"
      
      - name: Test
        run: |
          set -e
          echo "ｧｪ Running tests..."
          pnpm test || {
            echo "笶・Tests failed. Please fix failing tests before deploying."
            exit 1
          }
          echo "笨・All tests passed"
      
      - name: Build
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -e
          echo "畑 Building application..."
          pnpm build || {
            echo "笶・Build failed. Please fix build errors before deploying."
            exit 1
          }
          echo "笨・Build completed"

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      # 繧ｵ繧､繝井ｸ榊・蜷域､懃衍: 譛ｬ逡ｪ /api/health 縺後％縺ｮ push 縺ｮ繧ｳ繝溘ャ繝医〒豁｣蟶ｸ蠢懃ｭ斐☆繧九％縺ｨ繧貞宍蟇・↓遒ｺ隱阪☆繧九・      - name: Post-deploy verify (Gate 1)
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -e
          echo "竢ｳ Waiting for Railway deployment to sync..."
          echo "Expected commitSha (this deploy): $EXPECTED_SHA"
          sleep 600  # 10蛻・ Railway 縺ｮ繝薙Ν繝峨・繝・・繝ｭ繧､螳御ｺ・ｒ蠕・▽
          git fetch origin main --depth=1
          LATEST_MAIN=$(git rev-parse origin/main)
          echo "Latest main: $LATEST_MAIN"
          for i in $(seq 1 40); do
            echo "Verify attempt $i/40..."
            HEALTH=$(curl -s https://doin-challenge.com/api/health || echo "{}")
            HEALTH_SHA=$(echo "$HEALTH" | jq -r '.commitSha // .commitsha // .gitSha // "unknown"')
            OK=$(echo "$HEALTH" | jq -r '.ok // false')
            DB_CONNECTED=$(echo "$HEALTH" | jq -r '.db.connected // false')
            DB_ERROR=$(echo "$HEALTH" | jq -r '.db.error // ""')
            echo "Actual commitSha: $HEALTH_SHA, ok: $OK, db.connected: $DB_CONNECTED (expected: $EXPECTED_SHA or $LATEST_MAIN)"
            
            # 繧ｳ繝溘ャ繝・HA縺御ｸ閾ｴ縺励※縺・ｋ縺九メ繧ｧ繝・け
            SHA_MATCH=false
            if [[ "$HEALTH_SHA" == "$EXPECTED_SHA" ]] || [[ "$HEALTH_SHA" == "$LATEST_MAIN" ]]; then
              SHA_MATCH=true
            fi
            
            # 繧ｳ繝溘ャ繝・HA縺御ｸ閾ｴ縺励※縺・ｋ蝣ｴ蜷医・謌仙粥・・B謗･邯壹お繝ｩ繝ｼ縺ｯ隴ｦ蜻翫・縺ｿ・・            if [[ "$SHA_MATCH" == "true" ]]; then
              if [[ "$OK" == "true" ]]; then
                echo "笨・譛ｬ逡ｪ縺ｯ豁｣蟶ｸ縺ｫ蠢懃ｭ斐＠縺ｦ縺・∪縺・(commit: $HEALTH_SHA)"
              elif [[ "$DB_CONNECTED" == "false" ]]; then
                echo "笞・・繧ｳ繝溘ャ繝・HA縺ｯ荳閾ｴ縺励※縺・∪縺吶′縲√ョ繝ｼ繧ｿ繝吶・繧ｹ謗･邯壹お繝ｩ繝ｼ縺檎匱逕溘＠縺ｦ縺・∪縺・
                echo "笞・・繝・・繝ｭ繧､縺ｯ謌仙粥縺励※縺・∪縺吶′縲√ョ繝ｼ繧ｿ繝吶・繧ｹ險ｭ螳壹ｒ遒ｺ隱阪＠縺ｦ縺上□縺輔＞"
                echo "笞・・DB Error: $DB_ERROR"
                echo "Last health response: $HEALTH"
                # 繝・・繧ｿ繝吶・繧ｹ謗･邯壹お繝ｩ繝ｼ縺ｯ隴ｦ蜻翫→縺励※謇ｱ縺・√ョ繝励Ο繧､閾ｪ菴薙・謌仙粥縺ｨ縺ｿ縺ｪ縺・              else
                echo "笞・・繧ｳ繝溘ャ繝・HA縺ｯ荳閾ｴ縺励※縺・∪縺吶′縲｛k=false縺ｧ縺・
                echo "笞・・繝・・繝ｭ繧､縺ｯ謌仙粥縺励※縺・∪縺吶′縲∽ｻ悶・蝠城｡後′縺ゅｋ蜿ｯ閭ｽ諤ｧ縺後≠繧翫∪縺・
                echo "Last health response: $HEALTH"
              fi
              break
            fi
            
            if [[ $i -eq 40 ]]; then
              # 繧ｳ繝溘ャ繝・HA縺御ｸ閾ｴ縺励※縺・ｋ縺句・繝√ぉ繝・け
              SHA_MATCH=false
              if [[ "$HEALTH_SHA" == "$EXPECTED_SHA" ]] || [[ "$HEALTH_SHA" == "$LATEST_MAIN" ]]; then
                SHA_MATCH=true
              fi
              
              if [[ "$SHA_MATCH" == "true" ]]; then
                echo "笞・・繧ｳ繝溘ャ繝・HA縺ｯ荳閾ｴ縺励※縺・∪縺吶′縲｛k=false縺ｾ縺溘・DB謗･邯壹お繝ｩ繝ｼ縺檎匱逕溘＠縺ｦ縺・∪縺・
                echo "笞・・繝・・繝ｭ繧､縺ｯ謌仙粥縺励※縺・∪縺吶′縲∬ｨｭ螳壹ｒ遒ｺ隱阪＠縺ｦ縺上□縺輔＞"
                echo "Expected: $EXPECTED_SHA or $LATEST_MAIN"
                echo "Got: $HEALTH_SHA"
                echo "Health ok: $OK"
                echo "DB connected: $DB_CONNECTED"
                if [[ "$DB_CONNECTED" == "false" ]] && [[ -n "$DB_ERROR" ]]; then
                  echo "DB Error: $DB_ERROR"
                fi
                echo "Last health response: $HEALTH"
                exit 0
              fi
              
              echo "笶・譛ｬ逡ｪ縺梧悄蠕・さ繝溘ャ繝医∪縺溘・譛譁ｰmain縺ｧ蠢懃ｭ斐＠縺ｾ縺帙ｓ縺ｧ縺励◆・井ｸ榊・蜷医・蜿ｯ閭ｽ諤ｧ・・
              echo "Expected: $EXPECTED_SHA or $LATEST_MAIN"
              echo "Got: $HEALTH_SHA"
              echo "Health ok: $OK"
              echo "DB connected: $DB_CONNECTED"
              if [[ "$DB_CONNECTED" == "false" ]] && [[ -n "$DB_ERROR" ]]; then
                echo "DB Error: $DB_ERROR"
              fi
              echo "Last health response: $HEALTH"
              exit 1
            fi
            sleep 20
          done
          VERSION_JSON=$(curl -s https://doin-challenge.com/version.json || echo "{}")
          VJ_SHA=$(echo "$VERSION_JSON" | jq -r '.commitSha // .gitSha // "unknown"')
          echo "Version.json commitSha: $VJ_SHA (reference)"
          if [[ "$VJ_SHA" != "$EXPECTED_SHA" ]] && [[ "$VJ_SHA" != "unknown" ]]; then
            echo "笞・・/version.json 縺ｯ譛ｪ蜷梧悄縺ｮ蜿ｯ閭ｽ諤ｧ・・ercel 蛛ｴ縺ｮ蜿肴丐驕・ｻｶ・・
          fi

      - name: Gate 2 - API smoke
        env:
          BASE_URL: https://doin-challenge.com
        run: node scripts/gate2-api-smoke.mjs
        continue-on-error: true

      - name: Gate 2 - E2E (繝帙・繝竊定ｩｳ邏ｰ)
        env:
          PLAYWRIGHT_BASE_URL: https://doin-challenge.com
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          npx playwright install --with-deps chromium
          pnpm exec playwright test tests/e2e/gate2-flow.spec.ts --project=chromium
        continue-on-error: true
