name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production

      - name: Build Project Artifacts
        run: vercel build --prod

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod

      - name: Post-deploy verify
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -e
          echo "Expected commitSha: $EXPECTED_SHA"
          for i in $(seq 1 30); do
            VERSION=$(curl -s https://surechigai.kimito.link/version.json || echo "{}")
            ACTUAL=$(echo "$VERSION" | jq -r '.commitSha // "unknown"')
            echo "Attempt $i/30: version.json commitSha=$ACTUAL"
            if [[ "$ACTUAL" == "$EXPECTED_SHA" ]]; then
              echo "Deploy verified"
              exit 0
            fi
            sleep 20
          done
          echo "version.json not updated yet (Vercel may still be building)"
          exit 1

      - name: PageSpeed audit (mobile Lighthouse)
        continue-on-error: true
        run: |
          npx lighthouse@12 https://surechigai.kimito.link/ \
            --only-categories=performance,accessibility,best-practices,seo \
            --form-factor=mobile \
            --screenEmulation.mobile=true \
            --quiet \
            --chrome-flags="--headless --no-sandbox --disable-gpu" \
            --output=json \
            --output-path=pagespeed-report.json
          node scripts/pagespeed-summarize.mjs pagespeed-report.json | tee pagespeed-summary.md

      - name: Upload PageSpeed report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: pagespeed-report
          path: |
            pagespeed-report.json
            pagespeed-summary.md
