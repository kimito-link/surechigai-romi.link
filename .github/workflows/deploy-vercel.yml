name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production

      - name: Build Project Artifacts
        run: vercel build --prod

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod

      # Metro は子チャンクの参照先URLをファイル名ハッシュに含めないため、
      # 「同名・別内容」の親チャンクが CDN の immutable キャッシュに残ると
      # 旧コードが配られ続ける（2026-07-04 障害）。デプロイ毎に Cloudflare を
      # パージして防ぐ。secrets 未設定ならスキップ（theme/tokens の
      # CDN_CACHE_EPOCH +1 が代替手段）。
      - name: Purge Cloudflare cache
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_PURGE_TOKEN }}
        run: |
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "Cloudflare secrets not set; skipping purge (use CDN_CACHE_EPOCH bump instead)"
            exit 0
          fi
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache"             -H "Authorization: Bearer ${CF_API_TOKEN}"             -H "Content-Type: application/json"             --data '{"purge_everything":true}' | head -c 300
          echo ""

      - name: Post-deploy verify
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -e
          echo "Expected commitSha: $EXPECTED_SHA"
          sleep 5
          for i in $(seq 1 40); do
            VERSION=$(curl -s https://surechigai.kimito.link/version.json || echo "{}")
            ACTUAL=$(echo "$VERSION" | jq -r '.commitSha // "unknown"')
            echo "Attempt $i/40: version.json commitSha=$ACTUAL"
            if [[ "$ACTUAL" == "$EXPECTED_SHA" ]]; then
              echo "Deploy verified"
              exit 0
            fi
            sleep 5
          done
          echo "version.json not updated yet (Vercel may still be building)"
          exit 1
