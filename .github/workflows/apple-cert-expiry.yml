# гҖҗйҒЯеһӢгғҶгғігғ—гғ¬гғјгғҲгҖ‘Apple иЁјжҳҺжӣё / гғ—гғӯгғ“гӮёгғ§гғӢгғігӮ°гғ—гғӯгғ•гӮЎгӮӨгғ« жңҹйҷҗзӣЈиҰҒE#
# з§»жӨҚеҒE: partnership_program_website/.github/workflows/apple-cert-expiry.yml
#
# Apple Distribution иЁјжҳҺжӣё + App Store гғ—гғӯгғ“гӮёгғ§гғӢгғігӮ°гғ—гғӯгғ•гӮЎгӮӨгғ«гҒ®
# expiry гӮ’йҖұ 1 еӣҒE(жңҲжӣңеҚҲеүҚ 9 жҷҒEJST) гғҒгӮ§гғҒEӮҜгҒ—гҖҒE0 ж—Ҙд»ҘеҶҒEҒ«жңҹйҷҗеҲҒEӮҢ
# гҒ«гҒӘгӮӢгӮӮгҒ®гӮ’иҒEеӢҒEGitHub Issue еҢ–гҒҷгӮӢгҖҒE#
# зӣ®зҡҒE
#   1 е№ҙгҒ§гҒІгҒЈгҒқгӮҠ expire гҒҷгӮӢ Apple иЁјжҳҺжӣёгӮ’гҖҢгғ“гғ«гғүгҒҢеӨұж•—гҒ—гҒҹгҖҚгҒЁ
#   ж°—гҒҘгҒҒEҒҰгҒӢгӮүж…ҢгҒҰгҒҰеҶҚзҷәиЎҢгҒҷгӮӢгғ‘гӮҝгғјгғігӮ’ж’Іж»ҒEҖҒE0 ж—ҘеүҚгҒ« Issue гҒҢз«ӢгҒӨгҒ®гҒ§
#   дҪҷиЈ•гӮ’жҢҒгҒЈгҒҰ rotate + secrets жӣҙж–°гҒ§гҒҚгӮӢгҖҒE#
# иЁӯиЁҒE
#   - ж—ўеӯҒEASC API secrets гӮ’еҒEеҲ©з”Ё (иҝҪеҠ  secret 0 еҖҒE
#   - certificate гӮҒEprovisioning profile гӮҒE1 гҒӨгҒ® workflow гҒ§гӮ«гғҗгҒE
#   - йҮҚиӨҒEIssue гҒҜ cert/profile ID + иӯҰе‘ҠзӘ“гӮ’еҗ«гӮҖ title гҒ§ de-dupe
#
# в”Җв”Җ гҒ“гҒEгғҒEғігғ—гғ¬гҒ®дҪҝгҒҒE–№ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# 1. гҒ“гҒEгғ•гӮЎгӮӨгғ«гӮ’гӮўгғ—гғӘгғӘгғқгҒE `.github/workflows/apple-cert-expiry.yml` гҒ«гӮігғ”гҒEгҖҒE# 2. гӮўгғ—гғӘеӣәжңүеҖӨгҒ®зҪ®жҸӣгҒEдёҚиҰҒEјҒESC API з§ҳеҜҒEҚөгҒӢгӮүиҮӘеӢ•еҒEжҢҷпјүгҖӮз„Ўж”№еӨүгҒ§дҪҝгҒҲгӮӢгҖҒE# 3. scripts/apple-cert-expiry-check.mjs гӮҒEpartnership гҒӢгӮүгӮігғ”гҒEгҖҒE#
# в”Җв”Җ еҝҒEҰҒгҒӘ GitHub Secrets в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
#   APPSTORE_CONNECT_KEY_ID             ASC API Key ID
#   APPSTORE_CONNECT_ISSUER_ID          ASC API Issuer ID
#   APPSTORE_CONNECT_API_KEY_P8_BASE64  ASC API з§ҳеҜҒEҚө .p8 гӮҒEbase64 еҢҒE#   ҒEҒEos-appstore-release гҒЁеҗҢгҒҳ3зӮ№гӮ’еҒEеҲ©з”ЁгҖӮиҝҪеҠ  secret дёҚиҰҒEјҒEname: apple-cert-expiry

on:
  schedule:
    # жңҲжӣң 0:00 UTC = жңҲжӣң 9:00 JST
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      warning_days:
        description: "Threshold (days) for opening an issue"
        required: false
        default: "30"

permissions:
  issues: write
  contents: read

concurrency:
  group: apple-cert-expiry
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check cert + profile expiry
        run: node scripts/apple-cert-expiry-check.mjs > expiry-report.json
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_P8_BASE64 }}
          WARNING_DAYS: ${{ inputs.warning_days || '30' }}

      - name: Create or update issues for expiring items
        if: ${{ success() }}
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('expiry-report.json', 'utf8'));
            core.info(`Expiry check: ${JSON.stringify(report)}`);

            if (!report.warnings || report.warnings.length === 0) {
              core.info(`No certs/profiles within ${report.warningDays} days of expiry. OK.`);
              return;
            }

            for (const w of report.warnings) {
              const title = `[Cert expiry] ${w.kind}: ${w.name} expires in ${w.daysRemaining}d (${w.expirationDate.slice(0,10)})`;
              const search = await github.rest.search.issuesAndPullRequests({
                q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "[Cert expiry] ${w.kind}: ${w.name}"`,
              });
              if (search.data.total_count > 0) {
                core.info(`Issue already exists for ${w.kind} ${w.id}. Skipping.`);
                continue;
              }

              const portal = w.kind === 'certificate'
                ? 'https://developer.apple.com/account/resources/certificates'
                : 'https://developer.apple.com/account/resources/profiles';

              const rotateSteps = w.kind === 'certificate' ? [
                '1. https://developer.apple.com/account/resources/certificates гҒ§ expired еүҚгҒ«ж–°иҰҒEApple Distribution иЁјжҳҺжӣёгӮ’зҷәиЎҒE,
                '2. CSR + з§ҳеҜҒEҚөгӮҒEopenssl гҒ§з”ҹжҒEҒEҲжүӢй ҒEҒE _docs/release-pipeline-playbook.md еҸӮзҒEҒEҒE,
                '3. ж–° cert + private key гӮҒE`gh secret set IOS_DIST_CERT_CER_BASE64` / `IOS_DIST_PRIVATE_KEY_PEM_BASE64` гҒ§еҶҚжҠ•е…Ҙ',
                '4. ASC API гҒ§ж–° cert ID гӮ’еҸ–еҫ—гҒ—гҒҰ provisioning profile гӮ’еҒEз”ҹжҒE',
                '5. `gh secret set IOS_APPSTORE_PROFILE_BASE64` гҒ§жӣҙж–°',
                '6. `gh workflow run ios-appstore-release` гҒ§еӢ•дҪңзўәиӘҒE,
              ] : [
                '1. https://developer.apple.com/account/resources/profiles гҒ§ expired еүҚгҒ«еҗҒEApp ID гҒ® AppStore profile гӮ’жӣҙж–°',
                '2. гғҖгӮҰгғігғӯгғјгғҒEвҶҒE`base64 -w0 < new.mobileprovision`',
                '3. `gh secret set IOS_APPSTORE_PROFILE_BASE64` гҒ§жӣҙж–°',
                '4. `gh workflow run ios-appstore-release` гҒ§еӢ•дҪңзўәиӘҒE,
              ];

              const body = [
                `**Kind:** \`${w.kind}\``,
                `**Name:** ${w.name}`,
                `**ID:** \`${w.id}\``,
                `**Expires:** ${w.expirationDate}`,
                `**Days remaining:** ${w.daysRemaining}`,
                ``,
                `вҡ ҒEҒEжңҹйҷҗеҲҒEӮҢгҒҫгҒ§ **${w.daysRemaining} ж—Ҙ**гҖӮжңҹйҷҗеҒEгҒ« rotate гҒ—гҒӘгҒҒEҒЁ iOS workflow гҒҒE"No signing certificate found" зӯүгҒ§ fail гҒ—гҒҫгҒҷгҖӮ`,
                ``,
                `**Apple Developer Portal:** ${portal}`,
                ``,
                `### Rotation steps`,
                ...rotateSteps,
                ``,
                `_Auto-created by \`.github/workflows/apple-cert-expiry.yml\`._`,
                `_Detected at: ${report.timestamp}._`,
              ].join('\n');

              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure', 'cert-expiry'],
              });
              core.info(`Created issue #${created.data.number}: ${created.data.html_url}`);
            }
