name: sweep

on:
  schedule:
    # 15蛻・＃縺ｨ・・itHub Actions 縺ｯ螳滄圀縺ｫ縺ｯ5縲・0蛻・・驕・ｻｶ縺ゅｊ・・    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Run sweep
        run: |
          curl -s -X POST \
            -H "x-sweep-secret: ${{ secrets.SWEEP_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ vars.API_BASE_URL }}/api/sweep" \
            | tee sweep_result.json
          cat sweep_result.json
          # ok 繝輔ぅ繝ｼ繝ｫ繝峨′ true 縺ｧ縺ｪ縺代ｌ縺ｰ螟ｱ謨励→縺吶ｋ
          python3 -c "
          import json, sys
          with open('sweep_result.json') as f:
              data = json.load(f)
          if not data.get('ok'):
              print('Sweep failed:', data)
              sys.exit(1)
          print('Sweep OK:', data)
          "
