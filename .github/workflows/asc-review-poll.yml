# 【��型テンプレート】App Store Connect 審査スチE�Eタス監要E#
# 移植�E: partnership_program_website/.github/workflows/asc-review-poll.yml
#
# App Store Connect のアプリ審査状態を 30 刁E��きにポ�Eリングして、E# REJECTED / METADATA_REJECTED / DEVELOPER_REJECTED / INVALID_BINARY めE# 検�Eしたら�E勁EGitHub Issue を立てる、E#
# 目皁E
#   Apple からの「却下されました」メールを手で Claude に転送する作業をやめる、E#   リジェクト�E瞬間に Issue が開く�Eで、セチE��ョン開始時に
#     gh issue list --label ci-failure --label asc-reject --state open
#   で自動的に拾える、E#
# 設訁E
#   - 既存�E secrets (APPSTORE_CONNECT_KEY_ID / ISSUER_ID / P8_BASE64) を�E利用
#   - 追加 secret 0 倁E#   - ASC アプリレコードがまだ存在しなぁE��間�E no-op で exit
#   - 重褁EIssue は (bundleId, versionId, state) 単位で de-dupe
#   - 回復可能な reject (INVALID_BINARY 筁E は ios-appstore-release を�E勁Ere-dispatch
#
# ── こ�EチE��プレの使ぁE�� ──────────────────────────────────────────
# 1. こ�Eファイルをアプリリポ�E `.github/workflows/asc-review-poll.yml` にコピ�E、E# 2. 下�E com.surechigairomi.app めEapp.config.json identity.bundleId で置換、E# 3. scripts/asc-review-check.mjs めEpartnership からコピ�E、E#
# ── 忁E��な GitHub Secrets ────────────────────────────────────────
#   APPSTORE_CONNECT_KEY_ID             ASC API Key ID
#   APPSTORE_CONNECT_ISSUER_ID          ASC API Issuer ID
#   APPSTORE_CONNECT_API_KEY_P8_BASE64  ASC API 秘寁E�� .p8 めEbase64 匁E#   �E�Eos-appstore-release と同じ3点を�E利用。追加 secret 不要E��Ename: asc-review-poll

on:
  schedule:
    # 30 刁E��き。最低でめE5 刁E��位だぁEApple の更新頻度を老E��て 30 刁E��E    - cron: "*/30 * * * *"
  workflow_dispatch: {}
  workflow_run:
    workflows:
      - ios-appstore-release
    types: [completed]
    branches: [main]

permissions:
  issues: write
  contents: read
  # actions: write  Eused to auto-dispatch ios-appstore-release.yml
  # when the classifier detects a recoverable rejection (e.g. INVALID_BINARY)
  actions: write

# 連続実行を防ぁEconcurrency:
  group: asc-review-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      # ↁEapp.config.json identity.bundleId で置揁E      APP_BUNDLE_ID: com.kimito.link.surechigai
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Poll ASC API for rejected versions
        id: poll
        run: node scripts/asc-review-check.mjs > rejection-report.json
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_P8_BASE64 }}

      - name: Create or update issues for rejections
        if: ${{ success() }}
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('rejection-report.json', 'utf8'));
            core.info(`ASC poll result: ${JSON.stringify(report)}`);

            if (!report.appId) {
              core.info('No ASC app record yet for this bundleId. Nothing to monitor.');
              return;
            }
            if (!report.rejections || report.rejections.length === 0) {
              core.info('No rejected versions found.');
              return;
            }

            const repoUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;

            for (const r of report.rejections) {
              const title = `[ASC reject] ${r.state}: ${r.versionString} (${report.bundleId})`;
              // De-dupe via search
              const search = await github.rest.search.issuesAndPullRequests({
                q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`,
              });
              if (search.data.total_count > 0) {
                core.info(`Issue already exists for ${r.versionId} (state=${r.state}). Skipping.`);
                continue;
              }

              const cls = r.classification || { code: 'UNKNOWN', label: 'Unclassified', action: 'manual-review', hint: '' };
              const feedbackBlock = r.feedbackText
                ? ['### Apple feedback (raw)', '```', r.feedbackText.slice(0, 1500), '```', ''].join('\n')
                : '_No reviewer feedback text exposed via API yet  Echeck the ASC web UI._\n';

              const body = [
                `**Bundle ID:** \`${report.bundleId}\``,
                `**App name:** ${report.appName || '(unknown)'}`,
                `**Version:** \`${r.versionString}\``,
                `**State:** \`${r.state}\``,
                `**Version ID:** \`${r.versionId}\``,
                ``,
                `🛑 Apple rejected this App Store version. Check the reviewer feedback at:`,
                ``,
                `https://appstoreconnect.apple.com/apps/${report.appId}/distribution/ios/version/${r.versionId}`,
                ``,
                `### Auto-classification`,
                `- **Pattern:** \`${cls.code}\`  E${cls.label}`,
                `- **Suggested action:** \`${cls.action}\``,
                `- **Hint:** ${cls.hint}`,
                ``,
                feedbackBlock,
                `### Categories`,
                `- \`REJECTED\`: 機�E・コンチE��チE�E違反 (Guideline 系)`,
                `- \`METADATA_REJECTED\`: ストア掲載情報 (説明�Eスクショ・キーワード筁E`,
                `- \`DEVELOPER_REJECTED\`: 開発老E��人が取り下げた`,
                `- \`INVALID_BINARY\`: アチE�Eロード時のバイナリ検証エラー`,
                ``,
                `### Triage`,
                `1. ASC で reviewer feedback を読む (上訁Elink)`,
                `2. 申請事前 lint (\`ios-pre-submission-lint\`) で類似パターンが拾えなぁE��確認`,
                `3. 修正 ↁE\`package.json#version\` めEbump ↁE\`git push main\` で iOS workflow が�E build + 冁Esubmit`,
                ``,
                `_Auto-created by \`.github/workflows/asc-review-poll.yml\`._`,
                `_Detected at: ${report.timestamp}._`,
              ].join('\n');

              const labels = ['ci-failure', 'asc-reject'];
              if (cls.code && cls.code !== 'UNKNOWN') labels.push(`asc-reject:${cls.code.toLowerCase()}`);

              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });
              core.info(`Created issue #${created.data.number}: ${created.data.html_url} (action=${cls.action})`);

              // Auto-retry: if the classifier said the rejection can be cleared by
              // re-uploading metadata/binary (which is exactly what the existing
              // iOS workflow does), kick it off right now. No need to wait for
              // a human to click "re-run".
              const RETRY_ACTIONS = new Set([
                'rebuild-and-resubmit',
                'retry-after-metadata-fix',
                'retry-with-fresh-screenshots',
              ]);
              if (RETRY_ACTIONS.has(cls.action) || r.state === 'INVALID_BINARY') {
                try {
                  await github.rest.actions.createWorkflowDispatch({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: 'ios-appstore-release.yml',
                    ref: 'main',
                  });
                  core.info(`-> auto-triggered ios-appstore-release.yml for ${cls.action}`);
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: created.data.number,
                    body: `🤁EAuto-triggered \`ios-appstore-release.yml\` to retry submission (classifier action=\`${cls.action}\`).`,
                  });
                } catch (e) {
                  core.warning(`Could not auto-trigger ios-appstore-release: ${e.message}`);
                }
              }
            }
