name: E2E smoke (production)

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  e2e-guest:
    # ubuntu-latest (24.04) は playwright install-deps 非対応のため 22.04 を使用
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        timeout-minutes: 15
        run: pnpm exec playwright install chromium --with-deps

      - name: Typecheck
        run: pnpm check

      - name: Guest smoke + full-site audit (mobile + desktop)
        timeout-minutes: 20
        env:
          PLAYWRIGHT_BASE_URL: https://surechigai.kimito.link
          CI: "true"
        run: |
          pnpm exec playwright test \
            --project=public-smoke \
            --project=events-host-smoke \
            --project=audit-guest-mobile \
            --project=audit-guest-desktop

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
