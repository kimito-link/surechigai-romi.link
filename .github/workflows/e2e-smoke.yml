name: E2E smoke (production)

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  e2e-guest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-jammy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Guest smoke + full-site audit (mobile + desktop)
        timeout-minutes: 18
        env:
          PLAYWRIGHT_BASE_URL: https://surechigai.kimito.link
          CI: "true"
        run: |
          pnpm exec playwright test \
            --project=public-smoke \
            --project=events-host-smoke \
            --project=audit-guest-mobile \
            --project=audit-guest-desktop

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
